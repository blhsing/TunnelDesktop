name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build and upload release artifacts
    runs-on: windows-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.6'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python relay dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .\python-relay\requirements-dev.txt

      - name: Build artifacts
        shell: pwsh
        run: |
          .\build\build-go.ps1
          .\build\build-azure-relay.ps1
          .\build\build-python-relay.ps1
          .\build\build-android-home.ps1

      - name: Write checksums
        shell: pwsh
        run: |
          $files = @(
            'dist\bin\agent-windows-amd64.exe',
            'dist\bin\agent-configurator-windows-amd64.exe',
            'dist\bin\client-windows-amd64.exe',
            'dist\azure-relay\tunneldesktop-azure-relay.zip',
            'dist\python-relay\tunneldesktop-python-relay.zip',
            'dist\python-relay\tunneldesktop-python-relay-linux-cp39-vendored.zip',
            'dist\android\tunneldesktop-home-android-debug.apk'
          )
          foreach ($file in $files) {
            if (-not (Test-Path -LiteralPath $file)) {
              throw "missing release artifact: $file"
            }
          }
          $lines = Get-FileHash $files -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash.ToLowerInvariant())  $((Resolve-Path -LiteralPath $_.Path -Relative) -replace '^\.\\','')"
          }
          $lines | Set-Content -LiteralPath 'dist\bin\SHA256SUMS.txt' -Encoding ascii

      - name: Create release if needed
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ inputs.tag }}'
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --generate-notes
          }

      - name: Upload release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ inputs.tag }}'
          gh release upload $tag `
            'dist\azure-relay\tunneldesktop-azure-relay.zip' `
            'dist\python-relay\tunneldesktop-python-relay.zip' `
            'dist\python-relay\tunneldesktop-python-relay-linux-cp39-vendored.zip' `
            'dist\android\tunneldesktop-home-android-debug.apk' `
            'dist\bin\agent-windows-amd64.exe' `
            'dist\bin\agent-configurator-windows-amd64.exe' `
            'dist\bin\client-windows-amd64.exe' `
            'dist\bin\SHA256SUMS.txt' `
            --clobber

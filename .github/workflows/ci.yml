name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test and build
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: current

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python relay dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .\relay\python\requirements-dev.txt

      - name: Build Go artifacts
        shell: pwsh
        run: .\build\build-go.ps1

      - name: Build Azure relay
        shell: pwsh
        run: dotnet build .\relay\azure-dotnet\DeskFerry.Relay.csproj --configuration Release

      - name: Run Python relay tests
        shell: pwsh
        run: python -m pytest relay/python/tests

      - name: Build Android home APK
        shell: pwsh
        run: .\build\build-android-home.ps1

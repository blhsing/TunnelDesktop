name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test and build
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python relay dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .\python-relay\requirements-dev.txt

      - name: Run Go tests
        shell: pwsh
        run: go test ./...

      - name: Build Azure relay
        shell: pwsh
        run: dotnet build .\azure-relay\TunnelDesktop.Relay.csproj --configuration Release

      - name: Run Python relay tests
        shell: pwsh
        run: python -m pytest python-relay/tests

apply plugin: "com.android.application"

android {
    namespace "com.blhsing.tunneldesktop.home"
    compileSdk 35

    defaultConfig {
        applicationId "com.blhsing.tunneldesktop.home"
        minSdk 23
        targetSdk 35
        versionCode 36
        versionName "0.3.6"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation "com.squareup.okhttp3:okhttp:4.12.0"
}
